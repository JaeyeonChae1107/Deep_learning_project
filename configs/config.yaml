data:
  root: "./dataset/images"
  image_size: 512          # matches Lim & Song (2025) — enables direct Model A / paper comparison
  num_classes: 5
  class_names: ["1++", "1+", "1", "2", "3"]
  num_workers: 0           # 0 on Windows; 4 on Linux/Mac

training:
  batch_size: 8            # matches Lim & Song (2025)
  epochs: 400              # matches Lim & Song (2025)
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: sgd           # matches Lim & Song (2025); use 'adamw' to switch
  momentum: 0.9            # SGD momentum (ignored when optimizer=adamw)
  scheduler: cosine
  early_stopping_patience: 20  # matches Lim & Song (2025)
  seed: 42
  use_class_weights: true  # compensate for grade imbalance (grade 3 is very rare)

model:
  # backbone is fixed to resnext50_32x4d inside each model class;
  # changing this value has no effect — modify models/__init__.py to swap backbones.
  pretrained: true

perturbation:
  types: [brightness, contrast, gaussian_noise, random_crop, rotation]
  # Training: one type randomly chosen per sample, strength sampled from range
  brightness_range: [0.8, 1.2]
  contrast_range: [0.8, 1.2]
  gaussian_noise_sigma_range: [0.01, 0.05]
  random_crop_ratio_range: [0.85, 0.95]
  rotation_degrees_range: [-10, 10]
  # Evaluation: fixed strengths applied deterministically per perturbation type
  eval_brightness: 1.2
  eval_contrast: 1.2
  eval_gaussian_noise_sigma: 0.05
  eval_random_crop_ratio: 0.90
  eval_rotation_degrees: 10

consistency_loss:
  lambda_kl: 1.0           # weight of KL(p || p') in total loss for Models C and D

evaluation:
  gradcam_layer: "layer4"
  n_gradcam_samples: 10    # total Grad-CAM figures per perturbation type (10 → 2 per grade)

paths:
  checkpoint_dir: "./checkpoints"
  results_dir: "./results"
  figures_dir: "./figures"
  runs_dir: "./runs"        # TensorBoard log directory
